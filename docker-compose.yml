services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: productintel
      POSTGRES_PASSWORD: productintel
      POSTGRES_DB: productintel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productintel"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent:
    build: ./agent
    env_file: .env
    environment:
      # Override DATABASE_URL to reach the db service inside the Compose network.
      DATABASE_URL: postgresql+psycopg://productintel:productintel@db:5432/productintel
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Mounted so `docker compose exec agent python -m app.ingest /srv/corpus` works.
      - ./corpus:/srv/corpus:ro

volumes:
  pgdata:
